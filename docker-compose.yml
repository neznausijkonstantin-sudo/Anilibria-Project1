version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: anilibria-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: anilibria_adventures
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: anilibria-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/anilibria_adventures?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_INIT_ADMIN_USERNAME: admin
      APP_INIT_ADMIN_PASSWORD: admin
      APP_INIT_ADMIN_HOBBY: docker admin
    ports:
      - "8080:8080"

volumes:
  mysql-data: