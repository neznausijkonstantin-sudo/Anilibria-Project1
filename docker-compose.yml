services:
  mysql:
    image: mysql:8.0
    container_name: anilibria-adventures-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: anilibria_adventures
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./PP_3_1_5_Bootstrap_javaScript
    container_name: anilibria-adventures-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/anilibria_adventures?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_INIT_ADMIN_USERNAME: admin
      APP_INIT_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  mysql-data:
