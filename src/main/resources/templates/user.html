<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="/webjars/bootstrap/4.3.1/css/bootstrap.min.css">
    <title>User</title>
</head>
<body>
<nav class="navbar navbar-dark bg-dark p-0">
    <div class="container-fluid">
        <div class="text-white">
            <span><strong id="headerUsername"></strong></span>
            <span> with roles: </span>
            <span id="headerUserRoles"></span>
        </div>

        <div class="nav navbar-nav navbar-right">
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-link nav-link">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-2 mt-3 px-0">
            <ul class="nav flex-column nav-pills" role="tablist">
                <li>
                    <a class="nav-link active" href="#User" role="tab" data-toggle="pill" aria-selected="true">User</a>
                </li>
            </ul>
        </div>

        <div class="col-10 bg-light min-vh-100">
            <div class="container mt-3">
                <div class="tab-content">
                    <div role="tabpanel" class="tab-pane fade show active" id="User">
                        <div class="page-header">
                            <h2>User information-page</h2>

                            <div class="card mb-4">
                                <h5 class="card-header">About user</h5>
                                <div class="card-body">
                                    <table class="table table-striped mb-0">
                                        <thead>
                                        <tr>
                                            <th scope="col">ID</th>
                                            <th scope="col">Name</th>
                                            <th scope="col">Hobby</th>
                                            <th scope="col">Role</th>
                                        </tr>
                                        </thead>
                                        <tbody id="userInfoId">
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="card">
                                <h5 class="card-header">Franchises report</h5>
                                <div class="card-body">
                                    <div class="form-inline">
                                        <label for="yearInput" class="mr-2">Year</label>
                                        <input id="yearInput" type="number" class="form-control mr-2" value="2026" min="1900" max="2100">
                                        <button id="downloadExcelBtn" type="button" class="btn btn-primary">
                                            Download Excel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/webjars/jquery/3.3.1-1/jquery.min.js"></script>
<script src="/webjars/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="/webjars/bootstrap/4.3.1/js/bootstrap.min.js"></script>
<script src="/userScript.js"></script>
</body>
</html>
